{{- if and .Values.rbac .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "single-container.fullname" . }}
  labels:
    {{- include "single-container.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "single-container.fullname" . }}
  labels:
    {{- include "single-container.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "single-container.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "single-container.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
