{{- $storeName := .Values.secretStoreName | default "1password-sdk" }}
{{- $storeKind := "ClusterSecretStore" }}

{{- /*
  Shorthand secretVars

  Example:
    secretVars:
      DISCORD_TOKEN: "my-app/discord-token"
*/}}
{{- if .Values.secretVars }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "single-container.name" . }}-secrets
  labels:
    {{- include "single-container.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secretRefreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: {{ include "single-container.name" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range $envName, $ref := .Values.secretVars }}
    {{- $parts := splitList "/" $ref }}
    - secretKey: {{ $envName }}
      remoteRef:
        key: {{ index $parts 0 }}
        property: {{ index $parts 1 }}
    {{- end }}
{{- end }}

{{- /*
  Service token for inter-service auth
*/}}
{{- if and .Values.serviceToken .Values.serviceToken.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "single-container.name" . }}-service-token
  labels:
    {{- include "single-container.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.serviceToken.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: {{ include "single-container.name" . }}-service-token
    creationPolicy: Owner
  {{- if .Values.serviceToken.generatorName }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: {{ .Values.serviceToken.generatorName }}
  {{- else }}
  data:
    - secretKey: service_token
      remoteRef:
        key: {{ .Values.serviceToken.vaultItem | default (printf "%s-service-token" (include "single-container.name" .)) }}
        property: {{ .Values.serviceToken.vaultField | default "credential" }}
  {{- end }}
{{- end }}

{{- /*
  Fallback full ES block
*/}}
{{- if and .Values.externalSecrets (not .Values.secretVars) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "single-container.name" . }}-secrets
  labels:
    {{- include "single-container.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName | default $storeName }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default $storeKind }}
  target:
    name: {{ include "single-container.name" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.secrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        property: {{ .remoteRef.property }}
    {{- end }}
{{- end }}
