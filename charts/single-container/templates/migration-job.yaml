{{- if and .Values.db .Values.db.enabled .Values.db.migrate .Values.db.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "single-container.name" . }}-migrate
  labels:
    {{- include "single-container.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: {{ .Values.db.migrate.hookWeight | default "0" | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.db.migrate.backoffLimit | default 3 }}
  {{- if .Values.db.migrate.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.db.migrate.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "single-container.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (and .Values.serviceAccount .Values.serviceAccount.create) (and .Values.serviceAccount .Values.serviceAccount.name) }}
      serviceAccountName: {{ include "single-container.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- include "single-container.podSecurityContext" . | nindent 8 }}
      automountServiceAccountToken: false
      containers:
        - name: migrate
          image: "{{ .Values.db.migrate.image | default (printf "%s:%s" .Values.image (default .Chart.AppVersion .Values.imageTag)) }}"
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- include "single-container.containerSecurityContext" . | nindent 12 }}
          command:
            {{- toYaml .Values.db.migrate.command | nindent 12 }}
          {{- with .Values.db.migrate.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "db.secretName is required when db.enabled is true" .Values.db.secretName }}
                  key: uri
            {{- range $var, $value := .Values.db.migrate.env }}
            - name: {{ $var }}
              value: {{ quote $value }}
            {{- end }}
          {{- $readOnly := eq (include "single-container.readOnlyRootFilesystem" .) "true" }}
          {{- if $readOnly }}
          volumeMounts:
            - name: tmp-scratch
              mountPath: /tmp
          {{- end }}
      {{- if $readOnly }}
      volumes:
        - name: tmp-scratch
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
