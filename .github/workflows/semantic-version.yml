name: Semantic Version

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref or SHA to checkout before resolving the version"
        type: string
        default: ""
    outputs:
      version:
        description: "Next semantic version from semantic-release dry run"
        value: ${{ jobs.version.outputs.version }}

permissions:
  contents: write

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'synkronizedcd[bot]' }}
    outputs:
      version: ${{ steps.tag.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Get app token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Get Tag (dry run)
        uses: cycjimmy/semantic-release-action@v4
        id: tag
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          dry_run: true
