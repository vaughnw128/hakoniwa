name: Semantic Version

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref or SHA to checkout before resolving the version"
        type: string
        default: ""
    outputs:
      version:
        description: "Next semantic version from semantic-release dry run"
        value: ${{ jobs.version.outputs.version }}

permissions:
  contents: read

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'synkronizedcd[bot]' }}
    outputs:
      version: ${{ steps.tag.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Get Tag (dry run)
        uses: cycjimmy/semantic-release-action@v4
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dry_run: true
