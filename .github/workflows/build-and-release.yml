name: Build and Release

on:
  workflow_call:
    inputs:
      platforms:
        description: "Docker platforms to build for (comma-separated)"
        type: string
        default: "linux/amd64"
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Docker build context path"
        type: string
        default: "."
      build-args:
        description: "Additional Docker build-args (newline-separated KEY=VALUE)"
        type: string
        default: ""
      skip-docker:
        description: "Skip Docker build (e.g. for library-only releases)"
        type: boolean
        default: false
    outputs:
      new_version:
        description: "The new semantic version"
        value: ${{ jobs.build.outputs.new_version }}
      image:
        description: "Full image reference with tag"
        value: ${{ jobs.build.outputs.image }}

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
  actions: read

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'synkronizedcd[bot]' }}
    outputs:
      new_version: ${{ steps.tag.outputs.new_release_version }}
      image: ${{ steps.image-ref.outputs.image }}

    steps:
      - uses: actions/checkout@v6

      # Dry run release to get version
      - name: Get Tag
        uses: cycjimmy/semantic-release-action@v4
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dry_run: true

      - name: Set image reference
        id: image-ref
        run: |
          echo "image=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.new_release_version }}" >> "$GITHUB_OUTPUT"

      # Build + Push Docker image to GHCR
      - name: Login to GitHub Container Registry
        if: ${{ !inputs.skip-docker }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ !inputs.skip-docker }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: ${{ !inputs.skip-docker }}
        uses: docker/build-push-action@v6
        id: docker-build
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.new_release_version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            git_sha=${{ github.sha }}
            ${{ inputs.build-args }}

      - name: Attest build provenance
        if: ${{ !inputs.skip-docker && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.docker-build.outputs.digest }}
          push-to-registry: true

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  grype:
    name: Grype Container Scan
    needs: build
    if: ${{ needs.build.outputs.image != '' }}
    uses: vaughnw128/hakoniwa/.github/workflows/code-scanning.yml@main
    with:
      language: "none"
      skip-codeql: true
      skip-semgrep: true
      skip-checkov: true
      grype-image: ${{ needs.build.outputs.image }}
    secrets: inherit
