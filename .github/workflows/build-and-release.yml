name: Build and Release

on:
  workflow_call:
    inputs:
      platforms:
        description: "Docker platforms to build for (comma-separated)"
        type: string
        default: "linux/amd64"
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Docker build context path"
        type: string
        default: "."
      build-args:
        description: "Additional Docker build-args (newline-separated KEY=VALUE)"
        type: string
        default: ""
      skip-docker:
        description: "Skip Docker build (e.g. for library-only releases)"
        type: boolean
        default: false
    outputs:
      new_version:
        description: "The new semantic version"
        value: ${{ jobs.version.outputs.version }}
      image:
        description: "Full image reference with tag"
        value: ${{ jobs.meta.outputs.image }}

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
  actions: read

jobs:
  version:
    uses: vaughnw128/hakoniwa/.github/workflows/semantic-version.yml@main
    secrets: inherit

  meta:
    name: Build Metadata
    runs-on: ubuntu-latest
    needs: version
    if: ${{ needs.version.outputs.version != '' }}
    outputs:
      image: ${{ steps.image-ref.outputs.image }}
    steps:
      - name: Set image reference
        id: image-ref
        run: |
          echo "image=ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"

  build:
    if: ${{ !inputs.skip-docker && needs.version.outputs.version != '' }}
    needs: [version, meta]
    uses: vaughnw128/hakoniwa/.github/workflows/container-build.yml@main
    with:
      dockerfile: ${{ inputs.dockerfile }}
      build-context: ${{ inputs.build-context }}
      platforms: ${{ inputs.platforms }}
      push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      tags: |
        ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
        ghcr.io/${{ github.repository }}:latest
      build-args: |
        git_sha=${{ github.sha }}
        ${{ inputs.build-args }}
    secrets: inherit

  attest:
    if: ${{ !inputs.skip-docker && needs.version.outputs.version != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

  release:
    if: ${{ always() && needs.version.outputs.version != '' && (inputs.skip-docker || needs.build.result == 'success') }}
    needs: [version, build]
    uses: vaughnw128/hakoniwa/.github/workflows/semantic-release.yml@main
    secrets: inherit

  scan:
    if: ${{ !inputs.skip-docker && needs.version.outputs.version != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: [build, meta]
    runs-on: ubuntu-latest
    steps:
      - name: Scan image with Grype
        uses: anchore/scan-action@v6
        id: grype
        with:
          image: ${{ needs.meta.outputs.image }}
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
