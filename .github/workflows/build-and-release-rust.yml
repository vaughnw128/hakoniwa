name: Build and Release (Rust)

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Name of the binary (matches Cargo.toml package name)"
        type: string
        required: true
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        default: "./Dockerfile"
    outputs:
      new_version:
        description: "The new semantic version"
        value: ${{ jobs.version.outputs.version }}
      image:
        description: "Full image reference with tag"
        value: ${{ jobs.meta.outputs.image }}

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
  actions: read

jobs:
  version:
    uses: vaughnw128/hakoniwa/.github/workflows/semantic-version.yml@main
    secrets: inherit

  meta:
    name: Build Metadata
    runs-on: ubuntu-latest
    needs: version
    if: ${{ needs.version.outputs.version != '' }}
    outputs:
      image: ${{ steps.image-ref.outputs.image }}
    steps:
      - name: Set image reference
        id: image-ref
        run: |
          echo "image=ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"

  # Build binaries for each target in parallel
  build-amd64:
    name: Binary (amd64)
    needs: [version, meta]
    if: ${{ needs.version.outputs.version != '' }}
    uses: vaughnw128/hakoniwa/.github/workflows/build-rust-binary.yml@main
    with:
      target: x86_64-unknown-linux-gnu
      binary-name: ${{ inputs.binary-name }}

  build-arm64:
    name: Binary (arm64)
    needs: [version, meta]
    if: ${{ needs.version.outputs.version != '' }}
    uses: vaughnw128/hakoniwa/.github/workflows/build-rust-binary.yml@main
    with:
      target: aarch64-unknown-linux-gnu
      binary-name: ${{ inputs.binary-name }}

  build:
    needs: [version, meta, build-amd64, build-arm64]
    if: ${{ needs.version.outputs.version != '' }}
    uses: vaughnw128/hakoniwa/.github/workflows/container-build.yml@main
    with:
      dockerfile: ${{ inputs.dockerfile }}
      build-context: .
      platforms: linux/amd64,linux/arm64
      push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      tags: |
        ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
        ghcr.io/${{ github.repository }}:latest
      build-args: |
        git_sha=${{ github.sha }}
        BINARY_NAME=${{ inputs.binary-name }}
      artifact-amd64-name: ${{ inputs.binary-name }}-x86_64-unknown-linux-gnu
      artifact-arm64-name: ${{ inputs.binary-name }}-aarch64-unknown-linux-gnu
      executable-paths: |
        dist/linux/amd64/${{ inputs.binary-name }}
        dist/linux/arm64/${{ inputs.binary-name }}
    secrets: inherit

  attest:
    if: ${{ needs.version.outputs.version != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

  release:
    if: ${{ needs.version.outputs.version != '' }}
    needs: [version, build]
    uses: vaughnw128/hakoniwa/.github/workflows/semantic-release.yml@main
    secrets: inherit

  scan:
    if: ${{ needs.version.outputs.version != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs: [build, meta]
    runs-on: ubuntu-latest
    steps:
      - name: Scan image with Grype
        uses: anchore/scan-action@v6
        id: grype
        with:
          image: ${{ needs.meta.outputs.image }}
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
