name: Build and Release (Rust)

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Name of the binary (matches Cargo.toml package name)"
        type: string
        required: true
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        default: "./Dockerfile"
      helm-path:
        description: "Path to Helm chart directory (empty to skip)"
        type: string
        default: "./helm"
    outputs:
      new_version:
        description: "The new semantic version"
        value: ${{ jobs.release.outputs.new_version }}
      image:
        description: "Full image reference with tag"
        value: ${{ jobs.release.outputs.image }}

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # Get the version first so binary builds and docker build share it
  version:
    name: Get Version
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'synkronizedcd[bot]' }}
    outputs:
      new_version: ${{ steps.tag.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Tag (dry run)
        uses: cycjimmy/semantic-release-action@v4
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dry_run: true

  # Build binaries for each target in parallel
  build-amd64:
    name: Binary (amd64)
    needs: version
    uses: vaughnw128/hakoniwa/.github/workflows/build-rust-binary.yml@main
    with:
      target: x86_64-unknown-linux-gnu
      binary-name: ${{ inputs.binary-name }}

  build-arm64:
    name: Binary (arm64)
    needs: version
    uses: vaughnw128/hakoniwa/.github/workflows/build-rust-binary.yml@main
    with:
      target: aarch64-unknown-linux-gnu
      binary-name: ${{ inputs.binary-name }}

  # Build multi-arch Docker image from pre-built binaries, then semantic release
  release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: [version, build-amd64, build-arm64]
    outputs:
      new_version: ${{ needs.version.outputs.new_version }}
      image: ${{ steps.image-ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image reference
        id: image-ref
        run: |
          echo "image=ghcr.io/${{ github.repository }}:${{ needs.version.outputs.new_version }}" >> "$GITHUB_OUTPUT"

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.binary-name }}-x86_64-unknown-linux-gnu
          path: dist/linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.binary-name }}-aarch64-unknown-linux-gnu
          path: dist/linux/arm64

      - name: Mark binaries executable
        run: chmod +x dist/linux/amd64/${{ inputs.binary-name }} dist/linux/arm64/${{ inputs.binary-name }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        id: docker-build
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.new_version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            git_sha=${{ github.sha }}
            BINARY_NAME=${{ inputs.binary-name }}

      - name: Attest build provenance
        if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.docker-build.outputs.digest }}
          push-to-registry: true

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
