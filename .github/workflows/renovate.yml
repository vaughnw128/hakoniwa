name: Renovate

on:
  workflow_call:
    inputs:
      comment-body:
        description: "Body of the comment that triggered the workflow, if any"
        type: string
        default: ""
      event-name:
        description: "The name of the event that triggered the workflow"
        type: string
        default: ""

permissions: {}

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    if: |
      inputs.event-name != 'issue_comment' ||
      contains(inputs.comment-body, '@renovate')
    permissions:
      contents: read
      packages: read
    steps:
      - name: Get app token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: "${{ steps.app-token.outputs.token }}"

      - name: Run Renovate
        uses: renovatebot/github-action@v42.0.5
        env:
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository }}"
          RENOVATE_INTERNAL_CHECKS_FILTER: strict
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: true
        with:
          token: "${{ steps.app-token.outputs.token }}"
          renovate-version: "latest"
