name: Verify PR

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-pr:
    name: PR Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dry_run: true

      - name: Verify version increment
        if: steps.tag.outputs.new_release_version == steps.tag.outputs.last_release_version
        run: |
          echo "::error::PR will not increment the version. Ensure the PR title follows Conventional Commits (feat:, fix:, etc.)."
          exit 1
