name: Verify PR

on:
  workflow_call:
    inputs:
      pr-title:
        description: "The pull request title to validate"
        type: string
        required: true

permissions:
  contents: read

jobs:
  verify-pr:
    name: PR Quality
    runs-on: ubuntu-latest
    steps:
      - name: Verify version increment
        env:
          PR_TITLE: ${{ inputs.pr-title }}
        run: |
          if echo "$PR_TITLE" | grep -qP '^(feat|fix|perf|revert|feat!|fix!|perf!)(\(.+\))?!?:\s.+'; then
            echo "PR title follows Conventional Commits: $PR_TITLE"
          else
            echo "::error::PR title does not follow Conventional Commits. Got: '$PR_TITLE'. Expected format: 'type(scope): description' where type is feat, fix, perf, or revert."
            exit 1
          fi
