name: Security Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security:
    uses: ./.github/workflows/code-scanning.yml
    with:
      language: ""
      skip-codeql: true
      skip-semgrep: true
      checkov-soft-fail: false
