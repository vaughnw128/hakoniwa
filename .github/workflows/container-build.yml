name: Container Build

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref or SHA to checkout before building"
        type: string
        default: ""
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Docker build context path"
        type: string
        default: "."
      build-args:
        description: "Additional Docker build-args"
        type: string
        default: ""
      platforms:
        description: "Docker platforms to build for (comma-separated)"
        type: string
        default: "linux/amd64"
      push:
        description: "Push image to registry"
        type: boolean
        default: true
      tags:
        description: "Image tags to publish (newline-separated)"
        type: string
        required: true
      cache-ref:
        description: "Registry cache reference"
        type: string
        default: ""
      artifact-amd64-name:
        description: "Artifact name to download into dist/linux/amd64"
        type: string
        default: ""
      artifact-arm64-name:
        description: "Artifact name to download into dist/linux/arm64"
        type: string
        default: ""
      executable-paths:
        description: "Paths to chmod +x before building (newline-separated)"
        type: string
        default: ""
    outputs:
      digest:
        description: "Built image digest"
        value: ${{ jobs.build.outputs.digest }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Container
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.docker-build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Download amd64 artifact
        if: ${{ inputs.artifact-amd64-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-amd64-name }}
          path: dist/linux/amd64

      - name: Download arm64 artifact
        if: ${{ inputs.artifact-arm64-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-arm64-name }}
          path: dist/linux/arm64

      - name: Mark executables
        if: ${{ inputs.executable-paths != '' }}
        shell: bash
        run: |
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            chmod +x "$path"
          done <<'EOF'
          ${{ inputs.executable-paths }}
          EOF

      - name: Resolve cache reference
        id: cache-ref
        shell: bash
        run: |
          cache_ref="${{ inputs.cache-ref }}"
          if [ -z "$cache_ref" ]; then
            cache_ref="type=registry,ref=ghcr.io/${GITHUB_REPOSITORY,,}:buildcache"
          fi
          echo "value=$cache_ref" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        id: docker-build
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          cache-from: ${{ steps.cache-ref.outputs.value }}
          cache-to: ${{ steps.cache-ref.outputs.value }},mode=max
          tags: ${{ inputs.tags }}
          build-args: ${{ inputs.build-args }}
