name: Build Rust Binary

on:
  workflow_call:
    inputs:
      target:
        description: "Rust target triple (e.g. x86_64-unknown-linux-gnu)"
        type: string
        required: true
      binary-name:
        description: "Name of the binary to build (matches Cargo.toml package name)"
        type: string
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.target }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.target }}

      - name: Install cross-compilation tools
        if: inputs.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross linker
        if: inputs.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.target }}

      - name: Build binary
        run: cargo build --release --target ${{ inputs.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.binary-name }}-${{ inputs.target }}
          path: target/${{ inputs.target }}/release/${{ inputs.binary-name }}
          retention-days: 1
